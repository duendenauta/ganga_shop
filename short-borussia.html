<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Short Borussia</title>

  <link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Nunito', sans-serif;
      background: #f0e6f6;
      margin: 0;
      padding: 20px;
      color: #1a1a2e;
    }


    h1 {
      font-family: 'Boogaloo', cursive;
      margin-top: 0;
    }

    .estado {
      display: inline-block;
      background: #f1c40f;
      padding: 5px 12px;
      border-radius: 20px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .galeria img {
      width: 100%;
      border-radius: 12px;
      margin-bottom: 10px;
      cursor: pointer;
    }

    /* MODAL (lupa) */
    #modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      justify-content: center;
      align-items: center;
      z-index: 999;
    }

    #modal img {
      max-width: 90%;
      max-height: 90%;
      border-radius: 12px;
    }

    .precio {
      font-size: 1.3rem;
      font-weight: 800;
      margin: 10px 0;
      color: #6c3483;
    }

    .descripcion {
      line-height: 1.6;
      margin-bottom: 20px;
    }

    .btn {
      display: inline-block;
      background: #8e44ad;
      color: white;
      padding: 10px 18px;
      border-radius: 30px;
      text-decoration: none;
      font-family: 'Boogaloo';
    }

    .volver {
      display: inline-block;
      margin-bottom: 15px;
      text-decoration: none;
      font-weight: 700;
    }
  </style>
</head>

<body>

<div class="container">

  <a href="index.html" class="volver">← Volver</a>

  <h1>Short Borussia</h1>

  <div class="estado">Nuevo - Con etiqueta</div>

  <div class="galeria">
    <img src="imagenes/short-borussia.jpg">
    <img src="img/short2.jpg">
    <img src="img/short3.jpg">
  </div>

  <div class="precio">$65000</div>

  <div class="descripcion">
    Short Borussia Dortmund Original<br>
    Talle M<br>
    Nuevo, con etiqueta
  </div>

  <a class="btn" href="https://wa.me/5493412275506?text=Hola!%20Me%20interesa%20el%20Short%20Borussia%20⚽">
    Me interesa
  </a>

</div>

<!-- MODAL -->
<div id="modal" onclick="cerrarModal()">
  <img id="modal-img">
</div>

<!-- JS -->
<script>
  const modal = document.getElementById("modal");
  const modalImg = document.getElementById("modal-img");

  document.querySelectorAll(".galeria img").forEach(img => {
    img.addEventListener("click", () => {
      modal.style.display = "flex";
      modalImg.src = img.src;
    });
  });

  function cerrarModal() {
    modal.style.display = "none";
  }
</script>

</body>
</html>
